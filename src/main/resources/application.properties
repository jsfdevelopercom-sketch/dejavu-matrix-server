spring.application.name=matrix-server

# Production Postgres configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/matrixdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
# Driver and Dialect are auto-detected by Spring Boot based on the URL.
# If you need to override them, set DB_DRIVER and DB_DIALECT environment variables.
spring.datasource.driverClassName=${DB_DRIVER:}
spring.jpa.database-platform=${DB_DIALECT:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=${PORT:8082}

# Gemini AI settings
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash-lite}
ai.enabled=${AI_ENABLED:true}

