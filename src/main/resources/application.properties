spring.application.name=dejavu-backend

# Production Postgres configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/dejavudb_v2;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=sa
spring.datasource.password=
# Driver and Dialect are auto-detected by Spring Boot based on the URL.
# If you need to override them, set DB_DRIVER and DB_DIALECT environment variables.
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=${PORT:8081}

# Gemini AI settings
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-1.5-pro}
gemini.model.light=${GEMINI_MODEL_LIGHT:gemini-1.5-flash}
ai.enabled=${AI_ENABLED:true}
gpt.disabled=true
